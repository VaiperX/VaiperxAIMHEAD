<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VaiperX ULTRA PRO</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    <link rel="apple-touch-icon-precomposed" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    <link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    
    <meta property="og:image" content="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaiperX">

    <style>
        :root {
            --bg-body: #050507;
            --bg-panel: rgba(13, 13, 17, 0.80);
            --accent: #ff0033;
            --accent-glow: rgba(255, 0, 51, 0.4);
            --text-main: #f0f0f0;
            --text-dim: #707075;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-body); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* วิดีโอพื้นหลัง ยืดขยายตัดขอบให้เข้ากับขนาดหน้าจอมือถือทุกรุ่นแบบ 100% */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -100;
            object-fit: cover;
            background-position: center center;
            display: block;
        }

        /* เลเยอร์ฟิล์มสีดำโปร่งแสงกรองด้านหลังเมนู */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -99;
        }

        .splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a0505 0%, #050507 100%);
            z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-btn {
            padding: 15px 40px; background: var(--accent); color: white;
            border: none; border-radius: 50px; font-weight: 800; font-size: 16px;
            letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px var(--accent-glow);
        }

        .ui-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; 
            padding: calc(10px + env(safe-area-inset-top)) 15px calc(10px + env(safe-area-inset-bottom)) 15px;
        }

        .window { 
            width: 100%; max-width: 360px; 
            max-height: 90vh;
            background: var(--bg-panel); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; 
            border: 1px solid var(--card-border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
            padding: 30px 22px; text-align: center;
            position: relative; 
            overflow-y: auto;
            z-index: 10;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        
        .window.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        #lightningCanvas {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            z-index: 1;
            opacity: 0.6;
        }

        .content-wrap { position: relative; z-index: 5; }
        .profile-img { width: 85px; height: 85px; border-radius: 24px; border: 1px solid var(--accent); margin-bottom: 12px; box-shadow: 0 10px 20px var(--accent-glow); object-fit: cover; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { margin: 5px 0 25px; font-size: 10px; color: var(--accent); letter-spacing: 4px; font-weight: 700; text-transform: uppercase; }
        .menu-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: var(--card-bg); border-radius: 18px; border: 1px solid var(--card-border); }
        .label-group { display: flex; align-items: center; gap: 12px; }
        .icon-box { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255, 0, 51, 0.1); border-radius: 10px; color: var(--accent); }
        .row span { font-size: 14px; font-weight: 600; color: var(--text-main); }
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #252529; transition: .4s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #ececec; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background: #fff; }
        .btn-inject { display: block; width: 100%; padding: 18px; background: #fff; border: none; border-radius: 20px; color: #000; font-weight: 800; text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .status { margin-top: 15px; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }
        .window::-webkit-scrollbar { display: none; }
        .window { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="splash-screen" id="splashScreen">
    <img src="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png" style="width: 80px; margin-bottom: 20px; border-radius: 20px;">
    <button class="splash-btn" id="startBtn">START SYSTEM</button>
</div>

<video class="video-background" id="bgVideo" loop playsinline webkit-playsinline muted>
    <source src="https://docs.google.com/uc?export=download&id=1JSGUG_84g2sazqsZvn7Lci9OC5UuJE91" type="video/mp4">
</video>

<audio id="bgAudio" loop>
    <source src="https://solar-green-qmgluxdk.edgeone.app/3C3E5F22-330F-4C94-BB4A-EC382DA10EB2.mp3" type="audio/mp3">
</audio>

<div class="overlay"></div>

<div class="ui-container">
    <div class="window" id="uiWindow">
        <canvas id="lightningCanvas"></canvas>
        <div class="content-wrap">
            <img src="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png" class="profile-img">
            <div class="header">
                <h1>VaiperX ULTRA</h1>
                <p>Thunder Protection</p>
            </div>
            <div class="menu-list">
                <div class="row">
                    <div class="label-group">
                        <div class="icon-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>
                        </div>
                        <span>ยิงตัวโดนหัว</span>
                    </div>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="row">
                    <div class="label-group">
                        <div class="icon-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15a7 7 0 0 0 14 0"></path><path d="M2 9v3a10 10 0 0 0 20 0V9"></path><path d="M12 2v4"></path></svg>
                        </div>
                        <span>ระบบดูดหัว</span>
                    </div>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="row">
                    <div class="label-group">
                        <div class="icon-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        </div>
                        <span>ระบบกันแบน</span>
                    </div>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="row">
                    <div class="label-group">
                        <div class="icon-box">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </div>
                        <span>กันรหัสติดดำ</span>
                    </div>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>
            <div class="footer">
                <a href="potatso://" class="btn-inject" id="mainBtn">Activate Protection</a>
                <div class="status">ENCRYPTED CONNECTION : <span style="color:#00ff88">ON</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('bgVideo');
    const audio = document.getElementById('bgAudio');
    const splash = document.getElementById('splashScreen');
    const uiWindow = document.getElementById('uiWindow');
    const startBtn = document.getElementById('startBtn');

    // บังคับเตรียมโหลดข้อมูลวิดีโอและไฟล์เสียงล่วงหน้าก่อนถูกสั่งเล่น
    window.addEventListener('DOMContentLoaded', () => {
        video.load();
        audio.load();
    });

    startBtn.addEventListener('click', function() {
        // ทำการซ่อนหน้าต่างสแปลชสกรีนออกไป
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.display = 'none'; }, 800);
        
        // รันภาพวิดีโอพื้นหลังและไฟล์เสียงพร้อมกันอย่างสมบูรณ์แบบหลังเกิด Action จากผู้ใช้
        video.play().catch(e => console.log("วิดีโอจากไดรฟ์ติดปัญหา: ", e));
        audio.play().catch(e => console.log("ไฟล์เพลงติดปัญหา: ", e));

        // ⏱️ หน่วงเวลา 5 วินาที (5000 มิลลิวินาที) ให้หน้าต่าง UI เมนูเด้งขึ้นมาเข้าจังหวะเพลงพอดี
        setTimeout(() => {
            uiWindow.classList.add('active');
        }, 5000);
    });

    // ระบบเอฟเฟกต์สายฟ้าประดับหน้าจอ UI
    const canvas = document.getElementById('lightningCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = uiWindow.offsetWidth; canvas.height = uiWindow.offsetHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function drawLightning() {
        if(!uiWindow.classList.contains('active')) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let x = Math.random() * canvas.width;
        let y = 0;
        ctx.strokeStyle = '#ff0033'; ctx.lineWidth = 2; ctx.shadowBlur = 15; ctx.shadowColor = '#ff0033';
        ctx.beginPath(); ctx.moveTo(x, y);
        while (y < canvas.height) { x += (Math.random() - 0.5) * 50; y += Math.random() * 30; ctx.lineTo(x, y); }
        ctx.stroke();
        setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 100);
    }
    function thunderLoop() { setTimeout(() => { drawLightning(); thunderLoop(); }, Math.random() * 3000 + 1000); }
    thunderLoop();

    const mainBtn = document.getElementById('mainBtn');
    mainBtn.onclick = function() {
        this.innerText = "System Loading...";
        setTimeout(() => { this.innerText = "System Active"; this.style.background = "#00ff88"; }, 2000);
    };

    // ความปลอดภัย: ป้องกันการกดตรวจสอบซอร์สโค้ดและคลิกขวา
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) return false; };
    setInterval(function() {
        const startTime = performance.now(); debugger; const endTime = performance.now();
        if (endTime - startTime > 100) { document.body.innerHTML = '<div style="background:#000; color:red; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif; text-align:center; padding:20px;"><h1>SECURITY BREACH DETECTED</h1></div>'; }
    }, 1000);
</script>

</body>
</html>
